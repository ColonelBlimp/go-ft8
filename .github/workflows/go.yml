name: Go

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Task
        uses: go-task/setup-task@v2

      - name: Test
        run: task test

      - name: Test production smoke path
        run: task test:smoke-prod

      - name: Test race smoke path
        run: task test:race

      - name: Test production race smoke path
        run: task test:race-prod
